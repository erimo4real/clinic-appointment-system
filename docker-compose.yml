version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: clinic_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: clinic_appointment
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - clinic_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinic_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/clinic_appointment
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongodb
    networks:
      - clinic_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinic_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clinic_network

volumes:
  mongodb_data:

networks:
  clinic_network:
    driver: bridge
